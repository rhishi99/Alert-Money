name: test

# PR gate: runs the backend unit suite on every pull_request targeting main
# and on every push to main. deploy.yml already runs pytest post-merge on
# push to main only — this workflow closes the gap so PRs get gated too.
# No secrets, no deploy, no AWS/broker credentials — safe on fork PRs.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/backend/requirements.txt

      - name: Install backend deps
        working-directory: src/backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # Serial + no:randomly is deliberate: this repo has known temp-sqlite
      # deadlocks under parallel/random ordering.
      - name: Run backend unit suite
        working-directory: src/backend
        run: pytest tests/unit -q -p no:randomly

      # Codebase has never been linted — expect many findings on first run.
      # non-blocking until the backlog is triaged; flip to blocking later.
      - name: Lint backend (ruff)
        continue-on-error: true
        run: |
          pip install ruff
          ruff check src/backend

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend deps
        working-directory: src/frontend
        run: npm ci

      # Same deal as ruff above: first-ever lint run, non-blocking until the
      # findings are triaged (ROADMAP: audit-eslint9-migration).
      - name: Lint frontend
        continue-on-error: true
        working-directory: src/frontend
        run: npm run lint

      - name: Run frontend unit tests
        working-directory: src/frontend
        run: npx vitest run

      - name: Build frontend
        working-directory: src/frontend
        run: npm run build
